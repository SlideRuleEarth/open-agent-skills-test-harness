name: 01-cite-real-notebook
description: >
  For a request to see a worked example of a specific API, the skill reads
  references/index.md, identifies the matching example file, presents the
  real code, and cites the actual notebook name/path — without fabricating
  example code from training.
skills:
- sliderule-examples
prompt: Show me an example of how atl06p is used.
files: []
rubric:
- Reads references/index.md FIRST to locate which example file covers atl06p,
  rather than answering from training or guessing a filename.
- Identifies a real example that uses atl06p from the index (e.g. atl06p_request.py,
  first_request.py, or grandmesa.py — all listed under the atl06p API) and
  reads that specific references/{name}.py file.
- Presents actual code from the matched reference file, not invented example
  code reconstructed from the model's own knowledge of the sliderule client.
- Cites the matched example by its real filename and/or its GitHub notebook
  link as given in index.md — does NOT fabricate a notebook name or a URL.
- Does NOT bulk-read every example file; reads the index, then the one (or
  few) relevant atl06p file(s).
