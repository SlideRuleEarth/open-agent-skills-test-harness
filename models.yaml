# models.yaml — the models the harness tests.
# This is the SINGLE SOURCE OF TRUTH for model ids; nothing in the code hardcodes them.
#
# EDIT THIS FILE as models change:
#   • add a model          -> add a line under that runner's `models:`
#   • roll a model off      -> delete its line (and repoint `default:` if it was the default)
#   • change the cheap default -> set `default:` to any id present in that runner's `models:`
#
# Per-run model selection (for the chosen --agent, in priority order):
#   CLI --model  >  (--all-models ? the full `models:` list)  >  `default:` (a plain run)
#   >  the runner's own built-in default.
#
# A "runner" is the CLI used to reach a model (Claude Code, Codex, AntiGravity, Copilot).
# Each runner lists the models it supports; overlap across runners is expected for
# multi-vendor runners (e.g. Copilot can reach Claude, GPT, and Gemini models).
# NOTE: Copilot uses DOTS in Claude model ids (claude-sonnet-4.6) while Claude Code
# uses DASHES (claude-sonnet-4-6). Always use the runner's own id format.
# Validate edits with `agentskill-evals list-agents-configured-models`.
#
# Find current ids:  Claude -> Anthropic model docs / the claude-api skill
#                    Codex  -> `codex debug models` (JSON with slugs)
#                    AntiGravity -> `agy models` (display names; kebab-case ids also work)
#                    Copilot -> `copilot --help` / GitHub Copilot docs
#
# The ids below were verified against the installed CLIs (claude / codex 0.140.0 / agy 1.0.9
# / copilot 1.0.63) on 2026-06-22. Re-verify when a model is added or rolled off — a
# mistyped/retired id surfaces as a run error pointing back to this file.

agents:
  claude:
    default: claude-haiku-4-5        # cheapest — used by a plain `run`
    models:                          # the full set, run only with --all-models
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5
  codex:
    default: gpt-5.4-mini
    models:
      - gpt-5.5
      - gpt-5.4
      - gpt-5.4-mini
  antigravity:
    default: gemini-3.5-flash-low
    models:
      - gemini-3.5-flash-low
      - gemini-3.5-flash-medium
      - gemini-3.5-flash-high
      - gemini-3.1-pro-low
      - gemini-3.1-pro-high
      - claude-sonnet-4.6-thinking
      - claude-opus-4.6-thinking
      - gpt-oss-120b-medium
  copilot:
    default: claude-haiku-4.5            # cheapest (0.33 premium requests)
    models:
      - claude-opus-4.8
      - claude-opus-4.6
      - claude-sonnet-4.6
      - claude-haiku-4.5
      - gpt-5.5
      - gpt-5.4-mini
      - gemini-3.5-flash

judge:                               # the (cheap) model used to grade rubrics
  agent: copilot
  model: claude-haiku-4.5
