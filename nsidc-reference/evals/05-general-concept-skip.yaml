name: 05-general-concept-skip
skills:
- nsidc-reference
prompt: What is HDF5?
rubric:
- Recognizes this is a general-concept question — HDF5 is a public file-format spec, not an NSIDC- or
  ICESat-2-specific concept.
- Answers from training without invoking nsidc-reference. The SKILL.md `Skip the search — answer from
  training or web search` section explicitly lists 'What is HDF5?' as a do-not-search example.
- If nsidc-reference IS invoked, the agent recognizes the returned chunks merely mention HDF5 in the context
  of ICESat-2 file structure (without defining HDF5 itself) and either falls back to training-data definition
  or supplements rather than relying solely on retrieval.
- Does NOT cite an nsidc-reference chunk as the authoritative definition of HDF5 — at most, it might cite
  an ICESat-2-specific chunk as supplementary context, after defining HDF5 generically.
- Recognizes that 'How is ATL03 data laid out in HDF5?' WOULD warrant an nsidc-reference search (per the
  SKILL.md boundary table, that's a structure question), but the bare 'What is HDF5?' does not.
