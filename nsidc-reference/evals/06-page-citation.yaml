name: 06-page-citation
skills:
- nsidc-reference
prompt: How is photon classification done in ATL08? Walk me through the algorithm.
rubric:
- Invokes scripts/search.py with a concise technical query.
- Reads the returned chunks (ATL08 ATBD pages) and synthesizes the algorithm steps.
- 'Cites EVERY claim with a page number, not just the PDF URL — the SKILL.md `Agent instructions` step
  4 explicitly says ''Cite like this: "ATL08 ATBD v007, page 23, Photon Classification section" plus the
  URL — users often want the page number to locate the exact paragraph in the source PDF.'''
- If multiple chunks are cited, each gets its own page number (a 200-page ATBD has many sections that
  could match a query — single-PDF citations are not granular enough).
- Does NOT cite the URL alone with a generic 'see the ATBD' — that defeats the purpose of using a search
  index.
- Does NOT fabricate page numbers — page numbers come from the chunk's `source_page` field in the search
  response, not from the agent's guess.
