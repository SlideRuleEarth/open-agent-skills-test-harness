name: 03-task-metrics-reporting
description: >
  Reports a compact SlideRule Task Summary of task metrics (request function,
  region, time window, request duration, rows, columns, in-memory size) after
  the client call, capturing timing and data stats during execution — and still
  reports duration and a reason even when a request returns an empty
  GeoDataFrame or fails.
skills:
- sliderule-pipeline-python-client
prompt: |
  Use the sliderule Python client to run an atl06p request over this tiny
  polygon for January 2019. Heads up — it might come back empty. Either way,
  tell me how the request went.
files: []
rubric:
- After the request, reports a compact task-metrics summary in the format the skill specifies — a "SlideRule
  Task Summary" covering the client request function, region, time window, request duration, row count,
  column count, and in-memory size.
- Captures the metrics DURING execution by timing the client call (e.g. `start = time.time()` ...
  `elapsed = time.time() - start` around `icesat2.atl06p(parms)`) and reading row/column counts from the
  returned GeoDataFrame, rather than estimating them after the fact.
- Reports the request duration AND a reason even when the request returns zero rows or fails — does not
  silently omit metrics or skip the summary on an empty/failed result.
- Recognizes that an empty result comes back as an empty GeoDataFrame (not an exception), checks `len(gdf)`
  before filtering/aggregating, and exports the metadata and the zero-row finding rather than padding,
  mocking, or interpolating a placeholder series.
- Wraps the pipeline in try/except with informative error messages so a mid-script failure still reports
  what succeeded (including the timing captured before the failure).
- Casts numpy scalars with explicit `float()` (e.g. `round(float(val), 4)`) when assembling reported/exported
  values to avoid float32 JSON serialization errors.
