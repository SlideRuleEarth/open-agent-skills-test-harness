name: 01-required-pairing-coupling
description: When a user enables atl08_class, surface its mandatory cnf/srt pairings from parameter_couplings.md rather than presenting the parameter in isolation.
skills:
- sliderule-openapi
prompt: |
  I want to set atl08_class on my atl03x request to keep only vegetation photons.
  What does that parameter do, and is there anything else I need to set for it to work?
files: []
rubric:
- Looks the parameter up via the skill — uses scripts/openapi.py (e.g. `param atl08_class` or `applies-to
  atl03x`) for the spec signature, and recognizes the OpenAPI spec alone does NOT encode the coupling.
- Consults `references/parameter_couplings.md` for the coupling — the spec carries only the parameter
  signature, so the required pairings come from the curated supplement, not the raw slice.
- Surfaces the HARD required pairings for `atl08_class` as mandatory rather than optional — `cnf` ≤ 0
  (so ATL08-classified photons are not pre-filtered by confidence) and `srt=0` (land) — exactly as the
  coupling entry states.
- Does NOT present `atl08_class` as a standalone toggle that just works — omitting the cnf/srt requirement
  is a correctness failure, because the filter silently produces wrong output otherwise.
- May note the related distinction that `atl08_class` alone activates the classifier and emits the `atl08_class`
  column, whereas `atl08_fields` is a separate optional add-on — but does not confuse the two.
- Cites both sources — the parameter signature from the OpenAPI spec (e.g. the relevant Atl03Parameters
  schema) AND `references/parameter_couplings.md` for the pairing, so the user can verify both.
assertions:
- {type: ran_command, contains: "atl08_class"}
