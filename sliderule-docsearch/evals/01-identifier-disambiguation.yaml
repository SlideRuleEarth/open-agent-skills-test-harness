name: 01-identifier-disambiguation
skills:
- sliderule-docsearch
prompt: What does the atl06x endpoint do? How is it different from atl06p?
rubric:
- Invokes scripts/search.py with a query that includes the literal token `atl06x` (and ideally `atl06p`
  too).
- Recognizes that `atl06x` and `atl06p` are TWO distinct endpoints — atl06x is the X-Series API; atl06p
  is the legacy parallel API.
- Reads matched_tokens on each returned chunk to verify which identifier the chunk actually documents
  — does NOT cite an atl06p chunk when explaining atl06x.
- If the top result is an atl06p chunk because the legacy endpoint outranks the new one (a known retrieval
  failure mode), either re-runs with a more specific query or surfaces this to the user rather than silently
  citing the wrong endpoint.
- Produces an answer that distinguishes the two endpoints, citing the chunk(s) whose matched_tokens contain
  `atl06x` for atl06x claims and `atl06p` for atl06p claims.
- Cites URLs from the returned chunks, not URLs invented from training.
