name: scaffold-readme
description: >
  The agent should use the scaffold-readme skill to create a single README.md
  containing a title, a one-line summary, and a Usage section with a code block.
skills: [scaffold-readme]
prompt: |
  Scaffold a README for a project called "Acme Widgets" using the {skill} skill.
tags: [scaffolding, smoke]
timeout_sec: 300

# Deterministic checks — these run with no model, just inspecting the workspace
# and the normalized tool trace.
assertions:
  - type: file_exists
    description: README.md was created with a title and a Usage section
    path: README.md
    matches: "(?s)^#\\s.+##\\s*Usage"
  - type: file_absent
    description: did not scatter extra files
    path: package.json

# Behaviors graded by the LLM judge (one verdict per item).
rubric:
  - The README has a top-level title naming the project "Acme Widgets".
  - The README has a one-sentence summary of the project.
  - The README has a Usage section containing a fenced code block.
  - No files other than README.md were created.
