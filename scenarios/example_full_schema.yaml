# example_full_schema.yaml — reference example showing every scenario field.
#
# This file is a working scenario that exercises the complete schema. Use it as
# a template when writing new scenarios. Every field is annotated with its type,
# default, and purpose.
#
# Run:  agentskill-evals run --config scenarios/example_full_schema.yaml -y
# Dry:  agentskill-evals run --config scenarios/example_full_schema.yaml --dry-run

# --------------------------------------------------------------------------
# Identity
# --------------------------------------------------------------------------

name: full-schema example              # string (required) — unique identifier for this eval
description: >                         # string (optional, default: "") — human-readable goal
  Reference scenario exercising every schema field. Asks the model to write a
  trivial script and checks it with every assertion type the harness supports.

# --------------------------------------------------------------------------
# Target — which runner:model(s) to test (scenarios only; per-skill evals omit this)
# --------------------------------------------------------------------------

target:
  runner: copilot                      # string (required) — adapter name: claude | codex | copilot | antigravity
  model: claude-haiku-4.5             # string or list (optional) — model id(s); omit for models.yaml default
  # A list creates one cell per model (same as --model a,b on the CLI):
  # model:
  #   - claude-opus-4-8
  #   - claude-haiku-4-5
  # Each entry may pin its own reasoning effort — an @low|@medium|@high suffix or a
  # mapping — so one scenario compares models and/or thinking budgets per column
  # (same as --model claude-haiku-4.5@high,claude-opus-4.6@low on the CLI):
  # model:
  #   - claude-haiku-4.5@high
  #   - {model: claude-opus-4.6, reasoning_effort: low}

# --------------------------------------------------------------------------
# Skills — provisioned into the workspace; the ONLY repo skills visible (when isolated)
# --------------------------------------------------------------------------

skills:                                # list[str] (optional, default: [])
  - sliderule-api                      # each entry must match a <skills-root>/<name>/SKILL.md
  - sliderule-params
# Accepted aliases: `skill: sliderule-api` (singular string) also works.
# An empty list is valid — useful for A/B testing with vs. without skills.

# --------------------------------------------------------------------------
# Prompt — the instruction sent to the agent
# --------------------------------------------------------------------------
#
# Built-in placeholders (substituted per-adapter at run time):
#   {skill}  — the primary skill name (first entry in skills:)
#   {skills} — all skills, comma-joined
#
# Custom placeholders: {key} for any entry in vars: below.
#
# The `|` (literal block scalar) preserves newlines and trailing newline;
# `>` (folded scalar) joins lines into a paragraph. Use `|` for prompts
# with numbered steps or line-sensitive formatting.

prompt: |
  Using {skills}, write a Python script called run.py in the workspace root.
  The script should:
  1. Import json
  2. Print "{greeting}" to stdout
  3. Include a comment mentioning ATL06
  Region: {region}

# Accepted aliases: `query:` or `input:` work as legacy names for `prompt:`.

# --------------------------------------------------------------------------
# Prompt variables — substituted into {placeholders} in the prompt
# --------------------------------------------------------------------------

vars:                                  # dict[str, Any] (optional, default: {})
  greeting: hello sliderule
  region: Grand Mesa

# --------------------------------------------------------------------------
# Seed files — copied into the workspace before the agent runs
# --------------------------------------------------------------------------

# Each entry is either:
#   - a relative path (copied at that path):        "fixtures/input.json"
#   - a {source: dest} mapping for explicit dest:    {"data/raw.csv": "input.csv"}
# Paths are relative to this YAML file's directory.
files: []                              # list[str | dict] (optional, default: [])

# --------------------------------------------------------------------------
# Fixture — a directory tree copied as the starting workspace
# --------------------------------------------------------------------------

fixture: null                          # string | null (optional) — path relative to this file

# --------------------------------------------------------------------------
# Agent restriction — omit to run on all; set to restrict
# --------------------------------------------------------------------------

agents: null                           # list[str] | null (optional) — null = all runners
                                       # NOTE: in scenarios, the target governs the runner;
                                       # agents: is ignored. Useful in per-skill evals.

# --------------------------------------------------------------------------
# Timeout
# --------------------------------------------------------------------------

timeout_sec: 600                       # int (optional, default: 600) — max seconds for the agent run

# --------------------------------------------------------------------------
# Reasoning effort — thinking budget for the target runner
# --------------------------------------------------------------------------

reasoning_effort: null                 # "low" | "medium" | "high" | null (optional, default: null)
                                       # null = the runner's own default. Applies to target
                                       # models WITHOUT their own @effort pin; per cell the
                                       # precedence is CLI --reasoning-effort > a per-model
                                       # pin in target.model > this field. Mapped to the
                                       # runner's native control: claude --effort, codex
                                       # model_reasoning_effort, copilot --reasoning-effort.
                                       # Antigravity has no such control (effort is part of
                                       # its model id tier, e.g. gemini-3.5-flash-medium) —
                                       # warned + ignored there.

# --------------------------------------------------------------------------
# Tags — for filtering with --tag
# --------------------------------------------------------------------------

tags:                                  # list[str] (optional, default: [])
  - example
  - smoke

# --------------------------------------------------------------------------
# Environment variables — injected into the agent subprocess
# --------------------------------------------------------------------------

env: {}                                # dict[str, str] (optional, default: {})
                                       # NOTE: under isolation, HOME/USERPROFILE/XDG_* and
                                       # adapter config-homes are managed and override env: values.

# --------------------------------------------------------------------------
# Deterministic assertions — all must pass
# --------------------------------------------------------------------------
#
# Available assertion types and their keys:
#
#   Filesystem:
#     file_exists:    {type: file_exists, path: <rel>}
#                      optional: contains: <str>, matches: <regex>, min_size: <int>
#     file_absent:    {type: file_absent, path: <rel>}
#     dir_exists:     {type: dir_exists, path: <rel>}
#
#   Tool / command trace:
#     ran_command:    {type: ran_command}
#                      at least one of: contains: <str>, matches: <regex>, equals: <str>
#                      optional: ignore_case: <bool>
#     used_tool:      {type: used_tool, name: <tool>}
#     tool_count:     {type: tool_count}
#                      optional: min: <int>, max: <int>
#
#   Skill interaction:
#     skill_triggered:           {type: skill_triggered, skill: <name>}
#     skill_not_triggered:       {type: skill_not_triggered, skill: <name>}
#     skill_reference_read:      {type: skill_reference_read, skill: <name>}
#                                 optional: path: <filename> (within references/ subdir)
#     skill_reference_not_read:  {type: skill_reference_not_read, skill: <name>}
#                                 optional: path: <filename>
#     skill_script_executed:     {type: skill_script_executed, skill: <name>}
#                                 optional: path: <filename> (within scripts/ subdir)
#     skill_script_not_executed: {type: skill_script_not_executed, skill: <name>}
#                                 optional: path: <filename>
#
#   Process / output:
#     no_error:       {type: no_error}
#     exit_code:      {type: exit_code, equals: <int>}
#     final_contains: {type: final_contains}
#                      at least one of: contains: <str>, matches: <regex>
#                      optional: ignore_case: <bool>
#
#   Schema / judge (usually auto-added from rubric:/output_schema:; can be explicit):
#     output_matches_schema: {type: output_matches_schema}
#                             optional: schema: <json-schema> (defaults to top-level output_schema:)
#     llm_judge:             {type: llm_judge, rubric: [...]}
#                             optional: threshold: <0.0-1.0>
#
#   All assertion types accept an optional `description:` for custom failure messages.

assertions:
  # filesystem
  - {type: file_exists, path: run.py}
  - {type: file_exists, path: run.py, contains: "import json"}
  - {type: file_absent,  path: output.csv}

  # skill interaction
  - {type: skill_triggered,     skill: sliderule-api}
  - {type: skill_triggered,     skill: sliderule-params}

  # process
  - {type: no_error}

# --------------------------------------------------------------------------
# Rubric — behaviors graded by the LLM judge
# --------------------------------------------------------------------------
#
# Each entry is a plain-English behavior the judge evaluates pass/fail.
# Automatically compiled into a single llm_judge assertion at run time.
# Accepted alias: `expected_behavior:` (legacy).

rubric:
  - The script prints "hello sliderule" to stdout.
  - The script imports the json module.
  - The script contains a comment mentioning ATL06.

# --------------------------------------------------------------------------
# Output schema — JSON Schema the agent's structured output must match
# --------------------------------------------------------------------------
#
# When set, an output_matches_schema assertion is auto-added. Only meaningful
# for adapters that support structured output (e.g. claude with --json-schema).

output_schema: null                    # dict | null (optional) — JSON Schema object

# --------------------------------------------------------------------------
# Run knobs — overridable from CLI flags
# --------------------------------------------------------------------------

judge: true                            # bool | dict (optional, default: true)
                                       # false → skip LLM judge
                                       # or {agent: claude, model: haiku} to override judge config
isolated: true                         # bool (optional, default: true) — isolate skill visibility
# max_cells: 25                        # int (optional) — cap for this scenario
# jobs: 1                              # int (optional) — parallel cells
