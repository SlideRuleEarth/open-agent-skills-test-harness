# list_mcp_server_visible.yaml — a minimal scenario for asking the agent to list what MCP servers are visible to it.
# Run:  agentskill-evals run --config scenarios/list_mcp_server_visible.yaml
# Dry:  agentskill-evals run --config scenarios/list_mcp_server_visible.yaml --dry-run

name: list_mcp_server_visible
description: >
  Trivial prompt that produces list of skills and MCP servers visible to the agent.

target:
  runner: copilot
  model:
    - claude-haiku-4.5      

  runner: antigravity
  model:
    - gemini-3.5-flash-low
    - claude-sonnet-4.6-thinking
    - gpt-oss-120b-medium

  runner: codex
  model:
    - gpt-5.4-mini

  runner: claude
  model:
    - claude-haiku-4-5

skills:

assertions:
  - { type: no_error }

prompt: |
  List any skills and any MCP servers that are visible to you.  If you don't see any, say so.

judge: false          # skip LLM judge — keep it free
isolated: true
