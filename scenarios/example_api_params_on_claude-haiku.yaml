# A "scenario": several skills provisioned TOGETHER + a pinned target (runner:model).
# Run from the repo root with:
#   agentskill-evals run --config scenarios/example_api+params_on_claude-haiku.yaml
#
# By default the run is isolated — the model sees ONLY the skills listed below (plus the
# agent's own vendor skills), not other skills you have installed globally. Preview exactly
# what will be visible, with no API cost, by adding --dry-run.
name: api+params combination
description: Exercises the SlideRule API and params skills together.

target:                       # the runner:model this scenario tests
  runner: claude
  model: claude-haiku-4-5     # cheapest claude model; omit to use models.yaml's default

skills:                       # provisioned together; the only repo skills visible (isolated)
  - sliderule-api
  - sliderule-params

prompt: |
  Using {skills}, write a Python script run.py that submits an ATL06 request over a
  small region with a couple of custom processing parameters and writes the result to
  out.parquet. Keep it minimal and runnable.

rubric:                       # graded by the LLM judge
  - Calls an ATL06 endpoint from the SlideRule API skill (e.g. atl06p / atl06x).
  - Sets request parameters via the params skill rather than hardcoded guesses.
  - Defines a small region/polygon for the request.

assertions:                   # deterministic checks
  - {type: file_exists, path: run.py}

# Optional run knobs (any CLI flag overrides these):
judge: true
isolated: true
