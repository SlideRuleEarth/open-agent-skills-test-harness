# list_mcp_server_visible_claude.yaml — hermeticity check: with MCP off, the agent
# must see NO MCP servers. One runner per file (a `target:` pins a single runner; the
# earlier combined file silently collapsed four duplicate runner/model keys to just the
# last, so only claude ever ran and a leak could not be caught).
# Run:  agentskill-evals run --config scenarios/list_mcp_server_visible_claude.yaml
# Dry:  agentskill-evals run --config scenarios/list_mcp_server_visible_claude.yaml --dry-run

name: list_mcp_server_visible_claude
description: >
  Hermeticity check for the claude runner: ask the agent to list visible MCP servers;
  a hermetic (MCP-off) run must report none.

target:
  runner: claude
  model:
    - claude-haiku-4-5

skills:

assertions:
  - { type: no_error }

# The judge rejects a leak: a hermetic run exposes no MCP servers, so any server the
# agent reports visible is a hermeticity failure. `no_error` alone cannot catch this.
rubric:
  - The response reports that NO MCP servers are visible or available to the agent (naming any specific MCP server is a failure).

judge: true

prompt: |
  List any skills and any MCP servers that are visible to you.  If you don't see any, say so.
