# Minimal scenario for cheap, fast harness iteration.
# Tests that the full pipeline works (run → assertions → judge) without
# burning tokens on a real analysis. ~1 premium request for the run,
# ~0.33 for the judge.
name: smoke-test-harness-ux
description: Cheap end-to-end harness smoke test — one skill, trivial prompt, fast judge.

target:
  runner: copilot
  model: claude-haiku-4.5

skills:
  - sliderule-region-picker

prompt: |
  Read the sliderule-region-picker skill and list the steps it describes for letting
  a user define an analysis region by drawing on the SlideRule helper map.
  Write your answer to steps.txt, one step per line.

rubric:
  - Lists at least two real steps from the region-picker skill (not invented ones).
  - Wrote the answer to steps.txt rather than only printing it.

assertions:
  - {type: file_exists, path: steps.txt}
  - {type: skill_triggered, skill: sliderule-region-picker}
  - {type: no_error}

judge:
  agent: copilot
  model: claude-haiku-4.5

timeout_sec: 120
isolated: true
